<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frontend Debug Test</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .status { padding: 10px; margin: 10px 0; border-radius: 4px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .info { background: #d1ecf1; color: #0c5460; }
        pre { background: #f5f5f5; padding: 10px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>Frontend Debug Test</h1>
    <div id="status"></div>
    <div id="results"></div>

    <script>
        const statusDiv = document.getElementById('status');
        const resultsDiv = document.getElementById('results');

        function addStatus(message, type = 'info') {
            const div = document.createElement('div');
            div.className = `status ${type}`;
            div.textContent = message;
            statusDiv.appendChild(div);
        }

        function addResult(title, content) {
            const div = document.createElement('div');
            div.innerHTML = `<h3>${title}</h3><pre>${JSON.stringify(content, null, 2)}</pre>`;
            resultsDiv.appendChild(div);
        }

        async function testBackend() {
            addStatus('Testing backend connection...', 'info');

            try {
                // Test 1: Backend health
                const healthRes = await fetch('http://localhost:8000/api/companies');
                addStatus(`Backend response: ${healthRes.status}`, healthRes.ok ? 'success' : 'error');

                // Test 2: Login
                const loginRes = await fetch('http://localhost:8000/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: 'admin', password: 'admin123' })
                });
                const loginData = await loginRes.json();

                if (loginData.access_token) {
                    addStatus('Login successful!', 'success');
                    localStorage.setItem('access_token', loginData.access_token);
                    addResult('Login Response', loginData);

                    // Test 3: History API
                    const historyRes = await fetch('http://localhost:8000/api/chat/history?deduplicate=true&page=1&page_size=5', {
                        headers: { 'Authorization': `Bearer ${loginData.access_token}` }
                    });
                    const historyData = await historyRes.json();
                    addStatus(`History API: ${historyRes.status}`, historyRes.ok ? 'success' : 'error');
                    addResult('History Response', historyData);
                } else {
                    addStatus('Login failed!', 'error');
                    addResult('Login Error', loginData);
                }
            } catch (error) {
                addStatus(`Error: ${error.message}`, 'error');
                console.error(error);
            }
        }

        // Run tests on load
        testBackend();
    </script>
</body>
</html>
